# /etc/nginx/nginx.conf
# Pure WebSocket reverse proxy for RPi camera stream.
# nginx handles the video WebSocket at the kernel level — Python never touches frame bytes.
# Flask only handles control commands (tiny payloads).

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Performance tuning ──────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;          # critical for low-latency WebSocket
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Disable access log for video frames (high volume, useless noise)
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    # ── WebSocket upstream: the Python relay for video frames ────────────────
    # This is a lightweight asyncio server (stream_relay.py) that ONLY handles
    # raw frame forwarding. No Flask, no SocketIO overhead.
    upstream video_relay {
        server 127.0.0.1:8765;     # asyncio WebSocket relay (stream_relay.py)
        keepalive 32;
    }

    # ── Flask upstream: control commands only ────────────────────────────────
    upstream control_server {
        server 127.0.0.1:5000;     # Flask app (controls only, no video)
        keepalive 16;
    }

    server {
        listen 80;
        listen [::]:80;

        # ── Video WebSocket endpoint ─────────────────────────────────────────
        # Camera client connects here to PUSH frames.
        # Browser connects here to RECEIVE frames.
        # nginx proxies the WebSocket with zero Python parsing.
        location /stream {
            proxy_pass         http://video_relay;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            # No buffering — pass bytes through immediately
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         3600s;  # long-lived WebSocket connection
            proxy_send_timeout         3600s;

            # Disable proxy response buffering at kernel level
            proxy_request_buffering    off;
        }

        # ── Control dashboard (Flask) ────────────────────────────────────────
        location / {
            proxy_pass         http://control_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_buffering            off;
            proxy_read_timeout         3600s;
            proxy_send_timeout         3600s;
        }
    }
}
